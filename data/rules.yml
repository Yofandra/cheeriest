version: "3.0"

rules:
- rule: balas sapaan
  steps:
    - intent: greet
    - action: utter_greet

- rule: balas perpisahan
  steps:
    - intent: goodbye
    - action: utter_goodbye

- rule: tanya chatbot
  steps:
    - intent: ask_chatbot
    - action: utter_iamabot

- rule: berbagi perasaan
  steps:
    - intent: share_feelings
    - action: utter_ask_feelings

- rule: minta bantuan
  steps:
    - intent: need_support
    - action: utter_offer_support

- rule: minta motivasi
  steps:
    - intent: ask_motivation
    - action: utter_give_motivation

