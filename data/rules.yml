version: "3.0"

rules:
- rule: reply greeting
  steps:
    - intent: greeting
    - action: action_greet_user

- rule: reply goodbye
  steps:
    - intent: goodbye
    - action: action_bye_user

- rule: worthless suggestion
  steps:
    - intent: feeling_worthless
    - action: utter_suggestion_worthless

- rule: anxious depressed
  steps:
    - intent: anxious_depressed
    - action: utter_anxious_depressed

- rule: satisfaction suggestion
  steps:
    - intent: satisfaction
    - action: utter_suggestion_satisfaction

- rule: self-harm suggestion
  steps:
    - intent: self_harm
    - action: utter_self_harm

- rule: Fallback Response
  steps:
  - intent: nlu_fallback
  - action: utter_default

- rule: thanks
  steps:
    - intent: thanks
    - action: utter_thanks

- rule: about
  steps:
    - intent: about
    - action: utter_about

- rule: inform name
  steps:
    - intent: inform_name
    - action: utter_inform_name

- rule: need help
  steps:
    - intent: need_help
    - action: utter_need_help

- rule: feeling sad
  steps:
    - intent: feeling_sad
    - action: utter_feeling_sad

- rule: feeling stressed
  steps:
    - intent: stressed
    - action: utter_stressed

