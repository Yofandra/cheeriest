    - Aku terus-menerus merasa gagal dan tidak berguna.
    - Aku tidak melakukan apa pun selain memikirkan betapa buruknya diriku.
    - Aku ingin memperbaiki masalahku, tapi aku tidak tahu harus mulai dari mana.
    - Aku tidak punya motivasi untuk melakukan apa pun.
