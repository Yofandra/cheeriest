version: "3.1"

nlu:

- intent: affirm
  examples: |
    - yes
    - iya
    - tentu saja
    - kedengarannya bagus
    - benar
    - y
    - boleh

- intent: deny
  examples: |
    - tidak
    - n
    - nevermind
    - ga gitu
    - aku ga suka
    - ga mungkin
    - tidak mungkin

- intent: share_feelings
  examples: |
    - Aku sedang sedih
    - Aku kesepian
    - Hidupku terasa berat
    - Aku butuh teman curhat
    - Aku capek banget
    - Aku merasa kecewa
    - Aku merasa sedih
    - Aku merasa marah
    - Aku merasa takut

- intent: need_support
  examples: |
    - Bisa bantu aku?
    - Aku butuh bantuan

- intent: ask_chatbot
  examples: |
    - Kamu siapa?
    - Kamu bot ya?
    - Kau ni ape?

- intent: ask_motivation
  examples: |
    - Beri aku motivasi
    - Aku butuh motivasi
    - Beri aku semangat
    - Aku butuh semangat
    - Aku butuh dukunganmu
    - Aku butuh dukunganmu sekarang juga
