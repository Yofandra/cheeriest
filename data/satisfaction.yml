version: "3.1"

nlu:
- intent: satisfaction
  examples: |
    - Bagaimana saya bisa merasa puas dengan hidup saya setiap hari?
    - Apa yang bisa saya lakukan agar merasa lebih puas dari hari ke hari?
    - Bagaimana cara mencapai kepuasan dalam kehidupan sehari-hari?
    - Apa langkah-langkah yang bisa saya ambil untuk merasa lebih bahagia dan puas setiap hari?
    - Bagaimana saya bisa menemukan kebahagiaan dan kepuasan dalam rutinitas harian saya?
    - Apa yang perlu saya ubah agar bisa menikmati hidup lebih baik setiap hari?
    - Bagaimana cara membangun kebiasaan yang membuat saya merasa lebih puas setiap hari?
    - Apa yang harus saya lakukan agar lebih bersyukur dan puas dengan hidup saya?
    - Bagaimana saya bisa mencapai ketenangan dan kepuasan dalam hidup saya?
    - Apa yang bisa membantu saya menemukan makna dan kebahagiaan dalam setiap hari?