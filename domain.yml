version: "3.1"

intents:
  - greet
  - goodbye
  - share_feelings
  - need_support
  - affirm
  - deny
  - ask_chatbot
  - ask_motivation

responses:
  utter_greet:
  - text: "Halo!!, Aku disini dengerin kamu. Ada cerita apa hari ini?"

  utter_cheer_up:
  - text: "Semangatt!!, kamu pasti bisa!"

  utter_did_that_help:
  - text: "Apakah aku membantu?"

  utter_happy:
  - text: "Bagusss!!, tetep bahagia terus yaa"

  utter_goodbye:
  - text: "Makasih yaa udah cerita, kamu hebat kok! Sampai jumpa lagi!"

  utter_iamabot:
  - text: "Hai, aku adalah bot dan namaku cheeriest. Aku disini untuk mendengarkan ceritamu."

  utter_ask_feelings:
  - text: "Apa yang kamu rasakan? ada yang ingin kamu ceritakan?"
  
  utter_offer_support:
  - text: "Apa yang bisa aku lakukan untuk membantumu?"

  utter_give_motivation:
  - text: "motivasi mulu, kerja ajg"

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true

actions:
  - action_provide_motivation